<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OBS Compact Raffle v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* --- БАЗА --- */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: transparent; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: flex-end;
            padding: 20px; box-sizing: border-box;
        }

        :root {
            --widget-scale: 1;
        }

        /* --- ОБЩИЙ КОНТЕЙНЕР --- */
        .obs-container {
            width: 320px;
            display: flex; flex-direction: column; gap: 8px;
            transform: scale(var(--widget-scale));
            transform-origin: bottom right;
            transition: all 0.3s ease-out;
        }

        /* --- КОМПАКТНАЯ КАРТОЧКА --- */
        .compact-card {
            position: relative; width: 100%;
            min-height: 115px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; box-sizing: border-box;
            border-radius: 16px; overflow: hidden;
            background: #0a0a0a;
            background-image: radial-gradient(circle at 70% 50%, rgba(var(--rarity-rgb), 0.15) 0%, rgba(10, 10, 10, 1) 90%);
            border: 1px solid rgba(var(--rarity-rgb), 0.4);
            box-shadow: 0 5px 20px rgba(0,0,0,0.6), inset 0 0 20px rgba(var(--rarity-rgb), 0.05);
        }

        .compact-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
            transform: rotate(30deg); pointer-events: none; animation: shine 8s infinite linear;
        }
        @keyframes shine { from { transform: translateX(-100%) rotate(30deg); } to { transform: translateX(100%) rotate(30deg); } }

        /* БЕЙДЖИКИ */
        .badges-wrapper {
            position: absolute; top: 8px; left: 12px;
            display: flex; gap: 4px; z-index: 20;
        }
        .mini-badge {
            font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            color: rgba(255,255,255,0.9);
            background: rgba(var(--rarity-rgb), 0.25);
            padding: 2px 6px; border-radius: 4px;
            border: 1px solid rgba(var(--rarity-rgb), 0.3);
            display: flex; align-items: center; gap: 3px;
        }
        .badge-newbie { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); color: #4ade80; }
        .badge-completed { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #f87171; }

        /* ЛЕВАЯ ЧАСТЬ (ТЕКСТ) */
        .card-left {
            display: flex; flex-direction: column; justify-content: center;
            z-index: 5; max-width: 50%;
            margin-top: 14px;
        }
        .mini-quality { font-size: 9px; font-weight: 700; color: rgba(255, 255, 255, 0.5); margin-bottom: 2px; text-transform: uppercase; }
        .mini-name {
            font-size: 14px; font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            text-shadow: 0 1px 5px rgba(0,0,0,0.8);
        }

        /* ТАЙМЕР */
        .mini-timer {
            display: inline-flex; align-items: center; gap: 3px;
            background: rgba(0,0,0,0.6); padding: 4px 6px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1); font-size: 10px; color: #bbb; font-weight: 600;
            width: fit-content;
        }
        .timer-val { font-family: 'Courier New', monospace; color: #fff; font-weight: 800; font-size: 12px; }

        /* КАРТИНКА */
        .card-img {
            position: absolute; right: -15px; bottom: -5px;
            height: auto; max-height: 115px; width: auto; max-width: 55%;
            object-fit: contain; z-index: 10;
            image-rendering: -webkit-optimize-contrast;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.8));
            animation: weaponFloat 6s ease-in-out infinite;
        }
        @keyframes weaponFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* CTA */
        .cta-box {
            background: rgba(12, 12, 12, 1); backdrop-filter: blur(10px);
            border-radius: 10px; padding: 8px 12px; text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 11px; color: #999; font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .cta-highlight {
            font-weight: 800; font-size: 12px;
            color: rgb(var(--rarity-rgb));
            text-shadow: 0 0 10px rgba(var(--rarity-rgb), 0.4);
            letter-spacing: 0.5px; text-transform: uppercase;
        }
    </script>
</head>
<body>

    <div id="obs-overlay" class="obs-container" style="--rarity-rgb: 145, 70, 255">
        <div class="compact-card">
            <div class="badges-wrapper">
                <div class="mini-badge" id="status-badge"><span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> АКТИВЕН</div>
                <div class="mini-badge badge-newbie hidden" id="newbie-badge"><i class="fa-solid fa-leaf"></i> НОВИЧКАМ</div>
            </div>
            
            <div class="card-left">
                <div class="mini-quality" id="obs-quality" style="color: #9146FF">Field-Tested</div>
                <div class="mini-name" id="obs-name">Загрузка...</div>
                <div class="mini-timer" id="obs-timer">
                    <i class="fa-regular fa-clock" style="font-size:10px"></i>
                    <span class="timer-val h-v">00</span>:
                    <span class="timer-val m-v">00</span>:
                    <span class="timer-val s-v">00</span>
                </div>
            </div>
            <img src="" class="card-img" id="obs-img" alt="Skin" onerror="this.style.display='none'" onload="this.style.display='block'">
        </div>
        
        <div class="cta-box">
            Подробнее <span class="cta-highlight" id="obs-cta">!розыгрыш</span> в чат, заходи и участвуй!
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const raffleId = pathParts[pathParts.length - 1];
        let countdownTimer = null;

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '145, 70, 255';
        }

        // 1. Слушаем iframe конструктора админки
        window.addEventListener('message', (event) => {
            if (event.data.type === 'OBS_PREVIEW_UPDATE') {
                const conf = event.data.config;
                if(conf.scale) document.documentElement.style.setProperty('--widget-scale', conf.scale);
                updateWidget(event.data.data);
            }
        });

        // 2. Пуллинг данных из базы для реального OBS
        async function fetchRaffleData() {
            if(!raffleId || raffleId === "preview") return;
            try {
                const res = await fetch(`/api/v1/obs/raffle/${raffleId}/data`);
                if (!res.ok) return;
                const data = await res.json();
                updateWidget(data);
            } catch (e) {}
        }

        function updateWidget(data) {
            const s = data.settings || {};
            const rColor = s.rarity_color || '#9146FF';
            const rgbColor = hexToRgb(rColor);
            
            // Настройки контейнера
            const overlay = document.getElementById('obs-overlay');
            overlay.style.setProperty('--rarity-rgb', rgbColor);
            if(s.obs_config && s.obs_config.scale) {
                document.documentElement.style.setProperty('--widget-scale', s.obs_config.scale);
            }

            // Тексты
            document.getElementById('obs-name').innerText = s.prize_name || data.title || "Секретный приз";
            document.getElementById('obs-quality').innerText = s.skin_quality || "";
            document.getElementById('obs-quality').style.color = rColor;
            
            // Картинка
            const imgEl = document.getElementById('obs-img');
            if(s.prize_image) { imgEl.src = s.prize_image; } else { imgEl.style.display = 'none'; }

            // Бейджики
            const statusBadge = document.getElementById('status-badge');
            if(data.status === 'completed') {
                statusBadge.className = 'mini-badge badge-completed';
                statusBadge.innerHTML = '<i class="fa-solid fa-flag-checkered"></i> ЗАВЕРШЕНО';
                document.getElementById('obs-timer').innerHTML = 'РАЗДАЧА ОКОНЧЕНА';
            } else {
                statusBadge.className = 'mini-badge';
                statusBadge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> АКТИВЕН';
                startTimer(s.end_time || data.end_time); // Запускаем таймер
            }

            document.getElementById('newbie-badge').style.display = s.is_for_newbies ? 'flex' : 'none';

            // CTA (Призыв к действию)
            const ctaEl = document.getElementById('obs-cta');
            if(data.type && data.type.includes('twitch')) {
                ctaEl.innerText = '!розыгрыш'; // Если Твич
            } else {
                ctaEl.innerText = 'в TG Боте'; // Если Телеграм
            }
        }

        function startTimer(endTimeStr) {
            if(!endTimeStr) return;
            if (countdownTimer) clearInterval(countdownTimer);
            
            const update = () => {
                const el = document.getElementById('obs-timer');
                if (!el || el.innerHTML === 'РАЗДАЧА ОКОНЧЕНА') return;
                
                const diff = new Date(endTimeStr) - new Date();
                if (diff <= 0) { el.innerHTML = 'ЗАВЕРШЕНО'; clearInterval(countdownTimer); return; }
                
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
                
                const hEl = el.querySelector('.h-v');
                if(hEl) {
                    hEl.innerText = String(h).padStart(2, '0');
                    el.querySelector('.m-v').innerText = String(m).padStart(2, '0');
                    el.querySelector('.s-v').innerText = String(s).padStart(2, '0');
                }
            };
            update();
            countdownTimer = setInterval(update, 1000);
        }

        fetchRaffleData();
        setInterval(fetchRaffleData, 3000);
    </script>
</body>
</html>
