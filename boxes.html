<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Admin | Конструктор Коробок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #09090b; color: #a1a1aa; font-family: 'Inter', sans-serif; font-size: 0.875rem; }
        .sidebar { background-color: #09090b; border-right: 1px solid #27272a; }
        .nav-item { transition: all 0.2s ease; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background-color: #18181b; color: #e4e4e7; }
        .nav-item.active { border-left: 2px solid #9146FF; }
        .content-area { background-color: #09090b; }
        .glass-panel { background-color: #18181b; border: 1px solid #27272a; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm">

    <aside class="sidebar w-56 flex-shrink-0 hidden md:flex flex-col">
        <div class="h-14 flex items-center px-5 border-b border-zinc-800">
            <span class="text-lg font-bold text-zinc-100 tracking-wider">HATE<span class="text-[#9146FF]">LAVKA</span></span>
        </div>
        
        <nav class="flex-1 px-3 py-5 space-y-1">
            <a href="/settings" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-md text-zinc-400 font-medium hover:bg-zinc-800/50 hover:text-zinc-100 block">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg> Дашборд
            </a>
            <a href="/rewards" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-md text-zinc-400 font-medium hover:bg-zinc-800/50 hover:text-zinc-100 block">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Награды Twitch
            </a>
            <a href="/boxes" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-md text-zinc-100 font-medium bg-zinc-800 border-left-2 block">
                <svg class="w-4 h-4 text-[#9146FF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg> Коробки (Кейсы)
            </a>
        </nav>

        <div class="p-3 border-t border-zinc-800">
            <a href="/api/v1/auth/logout" class="flex items-center justify-center gap-2 py-1.5 rounded-md text-xs text-red-400/80 hover:bg-red-500/10 hover:text-red-400 transition-colors">Выйти</a>
        </div>
    </aside>

    <main class="flex-1 content-area flex flex-col h-full overflow-hidden">
        <header class="h-14 flex items-center px-6 border-b border-zinc-800 bg-[#09090b]/80 backdrop-blur z-10">
            <h2 class="text-base font-semibold text-zinc-100">Фабрика Коробок (Рандомизатор)</h2>
        </header>
        
        <div class="flex-1 p-6 overflow-y-auto space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Создание коробки -->
                <div class="glass-panel rounded-lg p-5 h-fit lg:col-span-1 space-y-4">
                    <h3 class="text-sm font-semibold text-zinc-100 border-b border-zinc-800 pb-2">Создать новую Коробку</h3>
                    <div>
                        <label class="text-[11px] text-zinc-400 block mb-1 uppercase font-medium">Название кейса</label>
                        <input type="text" id="box-title" placeholder="Пример: Новогодний дроп" class="w-full bg-[#09090b] border border-zinc-700 text-zinc-200 text-xs rounded px-3 py-2 focus:outline-none focus:border-[#9146FF]">
                    </div>
                    <div>
                        <label class="text-[11px] text-zinc-400 block mb-1 uppercase font-medium">Механика дропа</label>
                        <select id="box-type" class="w-full bg-[#09090b] border border-zinc-700 text-zinc-200 text-xs rounded px-3 py-2 focus:outline-none">
                            <option value="nick_length">🔢 Выдача по длине ника (1-30 символов)</option>
                        </select>
                    </div>
                    <button onclick="createBox()" class="w-full bg-[#9146FF] hover:bg-[#7b3ad6] text-white text-xs font-semibold py-2 rounded transition-colors shadow-sm mt-2">Собрать каркас коробки</button>
                </div>

                <!-- Список коробок -->
                <div class="glass-panel rounded-lg p-5 lg:col-span-2 flex flex-col h-full">
                    <h3 class="text-sm font-semibold text-zinc-100 border-b border-zinc-800 pb-2 mb-4">Активные Коробки в системе</h3>
                    <div class="flex-1 overflow-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-[#09090b] border-b border-zinc-800 text-[10px] uppercase text-zinc-500 sticky top-0">
                                <tr>
                                    <th class="py-2 px-3">Название</th>
                                    <th class="py-2 px-3 text-center">Механика</th>
                                    <th class="py-2 px-3 text-center">Предметов внутри</th>
                                    <th class="py-2 px-3 text-right">Действия</th>
                                </tr>
                            </thead>
                            <tbody id="boxes-table-body" class="text-xs divide-y divide-zinc-800/40"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadBoxes() {
            const tbody = document.getElementById('boxes-table-body');
            tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-zinc-500">Загрузка...</td></tr>';
            
            try {
                const res = await fetch('/api/v1/admin/boxes');
                const data = await res.json();
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-zinc-500">Коробки не созданы</td></tr>';
                    return;
                }
                
                data.forEach(b => {
                    const count = b.items && b.items[0] ? b.items[0].count : 0;
                    const badgeClass = count > 0 ? 'bg-green-500/10 text-green-400 border-green-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20';
                    tbody.innerHTML += `
                        <tr class="hover:bg-zinc-800/20 transition-colors">
                            <td class="py-2 px-3 text-zinc-200 font-medium">${b.name}</td>
                            <td class="py-2 px-3 text-center text-zinc-400">${b.box_type === 'nick_length' ? 'По длине ника' : 'Рандом'}</td>
                            <td class="py-2 px-3 text-center">
                                <span class="px-2 py-0.5 rounded border text-[10px] font-bold ${badgeClass}">${count} / 30 слотов</span>
                            </td>
                            <td class="py-2 px-3 text-right">
                                <button onclick="generateBox(${b.id})" class="text-[#2AABEE] hover:underline text-xs font-semibold mr-3">⚡ Сгенерировать пул</button>
                            </td>
                        </tr>`;
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-red-400">Ошибка</td></tr>';
            }
        }

        async function createBox() {
            const payload = {
                name: document.getElementById('box-title').value,
                box_type: document.getElementById('box-type').value
            };
            if (!payload.name) return alert('Введите название!');
            try {
                await fetch('/api/v1/admin/boxes/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                document.getElementById('box-title').value = '';
                loadBoxes();
            } catch (e) {}
        }

        async function generateBox(id) {
            if(!confirm("Это удалит старые предметы в коробке и заполнит 30 слотов новыми случайными скинами из базы магазина. Продолжить?")) return;
            try {
                const res = await fetch(`/api/v1/admin/boxes/${id}/generate`, { method: 'POST' });
                if (res.ok) { alert('Коробка успешно заполнена предметами!'); loadBoxes(); }
                else { alert('Ошибка генерации'); }
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', loadBoxes);
    </script>
</body>
</html>
